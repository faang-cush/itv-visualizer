<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Example: Step-Through Demo</title>
  <meta name="status" content="active" />
  <meta name="description" content="A minimal step-through visualization demonstrating the in-memory state + Next/Prev pattern." />
  <style>
    :root {
      --bg: #0e1116;
      --surface: #151a21;
      --line: #232b35;
      --text: #e6e9ef;
      --text-dim: #9aa4b2;
      --accent: #7aa2ff;
      --accent-soft: rgba(122, 162, 255, 0.14);
      --font: "Inter", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      --mono: ui-monospace, "SF Mono", Menlo, monospace;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: clamp(16px, 4vw, 32px);
      min-height: 100vh;
    }

    .panel {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    h1 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
    }

    .stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      min-height: 240px;
      padding: 28px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    .shape {
      width: 96px;
      height: 96px;
      display: grid;
      place-items: center;
      font-family: var(--mono);
      font-size: 1.6rem;
      font-weight: 600;
      color: #0e1116;
      background: var(--accent);
      transition: border-radius 0.4s ease, transform 0.4s ease, background 0.4s ease, rotate 0.4s ease;
    }

    .caption {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.92rem;
      line-height: 1.5;
      max-width: 38ch;
      min-height: 2.8em;
    }

    .caption strong { color: var(--text); font-weight: 600; }

    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    button {
      appearance: none;
      font-family: var(--font);
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 18px;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, opacity 0.16s ease;
    }

    button:hover:not(:disabled) { background: var(--accent-soft); border-color: var(--accent); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    .indicator {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--line);
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .dot.on { background: var(--accent); transform: scale(1.25); }

    .step-label {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-dim);
      text-align: center;
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Step-Through Demo</h1>

    <div class="stage">
      <div class="shape" id="shape" aria-hidden="true"></div>
      <p class="caption" id="caption" aria-live="polite"></p>
    </div>

    <div class="controls">
      <button id="prev" type="button">‹ Previous</button>
      <div class="indicator" id="indicator" role="presentation"></div>
      <button id="next" type="button">Next ›</button>
    </div>

    <p class="step-label" id="stepLabel"></p>
  </main>

  <script>
    (function () {
      // --- in-memory state: an array of steps and a current index ---
      var steps = [
        { glyph: "1", radius: "12px",  rotate: "0deg",   color: "#7aa2ff", text: "We start with a <strong>square</strong>. Use Next / Previous to walk through each state." },
        { glyph: "2", radius: "28px",  rotate: "0deg",   color: "#8be9c0", text: "The corners <strong>round off</strong>. Each step re-renders the view from state in memory." },
        { glyph: "3", radius: "50%",   rotate: "0deg",   color: "#f6c177", text: "It becomes a <strong>circle</strong>. No storage, no server — just JS variables." },
        { glyph: "4", radius: "50%",   rotate: "45deg",  color: "#e08aa8", text: "Finally it <strong>rotates</strong>. This is the pattern any visualization can reuse." }
      ];
      var index = 0;

      var shape = document.getElementById("shape");
      var caption = document.getElementById("caption");
      var prevBtn = document.getElementById("prev");
      var nextBtn = document.getElementById("next");
      var indicator = document.getElementById("indicator");
      var stepLabel = document.getElementById("stepLabel");

      // build the dot indicators once
      steps.forEach(function () {
        var d = document.createElement("span");
        d.className = "dot";
        indicator.appendChild(d);
      });

      function render() {
        var s = steps[index];
        shape.textContent = s.glyph;
        shape.style.borderRadius = s.radius;
        shape.style.rotate = s.rotate;
        shape.style.background = s.color;
        caption.innerHTML = s.text;
        stepLabel.textContent = "Step " + (index + 1) + " of " + steps.length;

        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === steps.length - 1;

        var dots = indicator.children;
        for (var i = 0; i < dots.length; i++) {
          dots[i].classList.toggle("on", i === index);
        }
      }

      function go(delta) {
        index = Math.min(steps.length - 1, Math.max(0, index + delta));
        render();
      }

      prevBtn.addEventListener("click", function () { go(-1); });
      nextBtn.addEventListener("click", function () { go(1); });

      // keyboard: arrow keys step through
      document.addEventListener("keydown", function (e) {
        if (e.key === "ArrowRight") { e.preventDefault(); go(1); }
        else if (e.key === "ArrowLeft") { e.preventDefault(); go(-1); }
      });

      render();
    })();
  </script>
</body>
</html>
